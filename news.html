<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Timeline</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 50px auto;
        }
        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: #8b0000;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
        }
        .timeline-item {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 40px;
        }
        .timeline-item.left .content {
            order: 1;
            text-align: right;
        }
        .timeline-item.right .content {
            order: 2;
            text-align: left;
        }
        .content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            width: 45%;
            position: relative;
        }
        .content::after {
            content: "";
            position: absolute;
            top: 20px;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .left .content::after {
            right: -10px;
            border-width: 10px 0 10px 10px;
            border-color: transparent transparent transparent white;
        }
        .right .content::after {
            left: -10px;
            border-width: 10px 10px 10px 0;
            border-color: transparent white transparent transparent;
        }
        .icon {
            width: 50px;
            height: 50px;
            background: #8b0000;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 50px;
            font-size: 20px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .profile {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .profile h4 {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="timeline">
        <div class="timeline-item left">
            <div class="content">
                <div class="profile">
                    <img src="images/profile1.jpg" alt="Kim">
                    <h4>김성범 교수님</h4>
                </div>
                <p>🏆 석탑강의상 (2024년 1학기)</p>
            </div>
        </div>
        <div class="icon"><i class="fa fa-trophy"></i></div>
        <div class="timeline-item right">
            <div class="content">
                <div class="profile">
                    <img src="images/profile2.jpg" alt="Kim Jaehoon">
                    <h4>김재훈, 추창욱, 차민성</h4>
                </div>
                <p>🏆 대상 (1등), ITRC 창의-자율과제</p>
            </div>
        </div>
        <div class="icon"><i class="fa fa-trophy"></i></div>
        <div class="timeline-item left">
            <div class="content">
                <div class="profile">
                    <img src="images/profile3.jpg" alt="Bae Jinsoo">
                    <h4>배진수, 심세진</h4>
                </div>
                <p>🏆 최우수상, ITRC 창의-자율과제</p>
            </div>
        </div>
        <div class="icon"><i class="fa fa-trophy"></i></div>
        <div class="timeline-item right">
            <div class="content">
                <div class="profile">
                    <img src="images/profile4.jpg" alt="Lee Hyesung">
                    <h4>이혜승, 박소연, 최지형</h4>
                </div>
                <p>🏆 우수상, 빅데이터 활용 창업 경진대회</p>
            </div>
        </div>
    </div>
</body>
</html>
